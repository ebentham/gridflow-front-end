name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Render dataset pages
        run: gridflow-build

      - name: Verify build idempotence (CI-03)
        run: gridflow-build --check

      - name: Install htmlhint (CI-01)
        run: npm install -g htmlhint
      - name: Run htmlhint
        run: htmlhint --config .htmlhintrc 'site/hifi/**/*.html'

      - name: Validate internal links (CI-02)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --offline
            --include-fragments
            './site/hifi/**/*.html'
          fail: true
          format: detailed

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/hifi

      - id: deployment
        uses: actions/deploy-pages@v4
