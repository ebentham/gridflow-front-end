name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Render dataset pages
        run: gridflow-build

      - name: Verify build idempotence (CI-03)
        run: gridflow-build --check

      - name: Validate HTML structure (CI-01)
        uses: mfinelli/setup-htmlhint@v4
        with:
          htmlhint-version: 1.6.3
      - name: Run htmlhint
        run: htmlhint --config .htmlhintrc 'site/hifi/**/*.html'

      - name: Validate internal links (CI-02)
        uses: lycheeverse/lychee-action@v2
        with:
          # Only check internal links — external are flaky in CI and not the bug class CI-02 protects.
          args: >
            --no-progress
            --offline
            --include-fragments
            --base ./site/hifi
            ./site/hifi
          fail: true
          format: detailed

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/hifi

      - id: deployment
        uses: actions/deploy-pages@v4
